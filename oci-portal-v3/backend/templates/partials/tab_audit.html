<!-- templates/partials/tab_audit.html -->
<div class="sec-hdr">
  <div class="sec-ttl">Audit log</div>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="loadAuditUsers();loadAudit()">
      <i class="ti ti-refresh"></i> Refresh
    </button>
    <a href="/api/audit/export" class="btn btn-primary" target="_blank">
      <i class="ti ti-download"></i> Export CSV
    </a>
  </div>
</div>

<div class="afilt">
  <div class="fg" style="min-width:160px">
    <label style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text-2)">User</label>
    <select id="af-user" onchange="loadAudit()">
      <option value="">All users</option>
    </select>
  </div>
  <div class="fg" style="min-width:160px">
    <label style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text-2)">Action</label>
    <select id="af-action" onchange="loadAudit()">
      <option value="">All actions</option>
      <option value="START">Start instance</option>
      <option value="STOP">Stop instance</option>
      <option value="SOFTRESET">Reboot instance</option>
      <option value="LOGIN">Login</option>
      <option value="CREATE_USER">Create user</option>
      <option value="UPDATE_USER">Update user</option>
      <option value="DELETE_USER">Delete user</option>
    </select>
  </div>
  <div class="fg" style="min-width:140px">
    <label style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text-2)">Region</label>
    <select id="af-region" onchange="loadAudit()">
      <option value="">All regions</option>
    </select>
  </div>
  <div class="fg" style="flex:1;min-width:160px">
    <label style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text-2)">Search</label>
    <div class="sw">
      <i class="ti ti-search"></i>
      <input id="af-q" type="text" placeholder="Search resource or user…" oninput="loadAudit()" />
    </div>
  </div>
</div>

<div class="tw">
  <table>
    <thead>
      <tr>
        <th style="width:14%">Timestamp</th>
        <th style="width:11%">Username</th>
        <th style="width:14%">Action</th>
        <th style="width:18%">Resource</th>
        <th style="width:13%">Region</th>
        <th style="width:20%">Compartment</th>
        <th style="width:10%">IP</th>
      </tr>
    </thead>
    <tbody id="audit-tbody">
      <tr><td colspan="7"><div class="empty"><i class="ti ti-loader"></i>Loading…</div></td></tr>
    </tbody>
  </table>
</div>
